<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片深度取证分析器 (V3.0) </title>
    <!-- 引入外部依赖 -->
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Pantone 色彩定义 */
        :root {
            --lemon-icing: #f2e7b8;
            --nimbus-cloud: #d5d6d8;
            --raindrops-on-roses: #ead2d9;
            --cloud-dancer: #f0f0ee;
            --ice-melt: #cbdde9;
            --peach-dust: #f2dcd0;
            --almost-aqua: #cedcc8;
            --orchid-tint: #dbd7e6;
        }

        body { 
            background-color: var(--cloud-dancer); 
            background-image: radial-gradient(circle at top right, white, transparent);
        }

        .forensic-canvas { cursor: crosshair; image-rendering: pixelated; background-color: #1a1a1a; }
        
        /* 模拟图中的卡片悬浮感 */
        .pantone-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
            border-radius: 2rem;
        }

        .btn-ice-melt {
            background-color: var(--ice-melt);
            color: #4a5568;
            transition: all 0.3s ease;
        }
        .btn-ice-melt:hover {
            filter: brightness(0.95);
            transform: translateY(-1px);
        }

        .alert-raindrops {
            background-color: var(--raindrops-on-roses);
            border-left: 4px solid #b3909a;
            color: #704a55;
        }

        .magnifier {
            position: absolute;
            border: 2px solid var(--ice-melt);
            border-radius: 12px;
            pointer-events: none;
            display: none;
            z-index: 50;
            background-repeat: no-repeat;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }
        .critical-hit { animation: shake 0.4s ease-in-out; }
    </style>
</head>
<body class="min-h-screen font-sans text-slate-700">

    <div class="max-w-7xl mx-auto py-10 px-6">
        <!-- 头部：采用 Nimbus Cloud 柔和色调 -->
        <header class="flex flex-col md:flex-row justify-between items-end mb-10 gap-4 border-b border-slate-200 pb-6">
            <div>
                <h1 class="text-3xl font-black text-slate-800 tracking-tighter flex items-center gap-2">
                    <span class="w-8 h-8 rounded-lg" style="background-color: var(--orchid-tint);"></span>
                    图像取证分析器 <span class="text-slate-400 font-light">V3.0</span>
                </h1>
                <p class="text-slate-500 text-sm mt-1">图片属性分析 | AI伪造检测</p>
            </div>
            <div class="flex gap-3">
                <button onclick="location.reload()" class="px-5 py-2 bg-white rounded-xl text-xs font-bold hover:shadow-md transition-all border border-slate-100">重置扫描</button>
                <div class="px-5 py-2 rounded-xl text-xs font-bold shadow-sm flex items-center gap-2" style="background-color: var(--almost-aqua);">
                    状态：系统运行正常
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- 左侧：载入与预览 -->
            <div class="lg:col-span-7 space-y-6">
                <div id="dropZone" class="pantone-card p-16 text-center transition-all cursor-pointer hover:border-slate-400 border-2 border-dashed border-transparent flex flex-col items-center">
                    <div class="w-24 h-24 rounded-3xl flex items-center justify-center mb-6 shadow-sm" style="background-color: var(--lemon-icing);">
                        <svg class="w-10 h-10 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                    </div>
                    <p class="text-slate-800 font-black text-xl">载入取证样本</p>
                    <p class="text-slate-400 text-sm mt-2 font-medium">点击此处 或 拖拽原图至此</p>
                    <div class="mt-4 px-4 py-1 rounded-full text-[10px] font-bold text-red-400 border border-red-100 bg-red-50">粘贴功能已禁用以防数据丢失</div>
                    <input type="file" id="fileInput" class="hidden" accept="image/jpeg,image/png">
                </div>

                <div id="previewContainer" class="hidden pantone-card p-5">
                    <div class="flex justify-between items-center mb-4">
                        <span class="flex items-center gap-2">
                            <span class="w-2 h-2 rounded-full" style="background-color: var(--raindrops-on-roses);"></span>
                            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Pixel Analysis Domain</h3>
                        </span>
                        <button id="runElaBtn" class="btn-ice-melt px-6 py-1.5 rounded-full text-[11px] font-black shadow-sm">深度像素分析</button>
                    </div>
                    <div class="relative rounded-2xl overflow-hidden shadow-sm bg-black border border-white/20">
                        <canvas id="imgCanvas" class="forensic-canvas w-full"></canvas>
                        <canvas id="maskCanvas" class="absolute top-0 left-0 w-full pointer-events-none"></canvas>
                        <div id="magnifier" class="magnifier" style="width:200px; height:200px;"></div>
                    </div>
                </div>
            </div>

            <!-- 右侧：属性报告 -->
            <div class="lg:col-span-5 space-y-6">
                <div id="reportPanel" class="hidden pantone-card overflow-hidden min-h-[600px] flex flex-col">
                    <div class="px-8 py-6 flex justify-between items-center" style="background-color: var(--nimbus-cloud);">
                        <h2 class="font-black text-xs uppercase tracking-widest text-slate-600">取证审计报告</h2>
                        <div id="statusBadge" class="px-3 py-1 rounded-full text-[10px] font-black text-white bg-slate-400">WAITING</div>
                    </div>
                    
                    <div class="p-8 flex-1">
                        <!-- 异常风险预警 -->
                        <div id="riskAlerts" class="space-y-3 mb-8"></div>

                        <!-- 摘要 -->
                        <div class="p-5 rounded-3xl mb-8 border border-white" style="background-color: var(--peach-dust);">
                            <h4 class="text-[10px] font-black text-slate-500 uppercase mb-2">取证核心摘要</h4>
                            <p id="summaryText" class="text-xs text-slate-700 leading-relaxed font-medium">等待载入...</p>
                        </div>

                        <!-- 元数据区 -->
                        <div id="exifDataArea" class="hidden">
                            <div class="flex items-center justify-between mb-4">
                                <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic">Raw Metadata Tags</h4>
                                <span id="exifCount" class="text-[10px] bg-white/50 px-3 py-1 rounded-full font-bold">0 Tags</span>
                            </div>
                            <div class="max-h-[350px] overflow-y-auto rounded-2xl border border-slate-100 no-scrollbar shadow-inner bg-white/30">
                                <table class="w-full text-[11px]">
                                    <tbody id="exifTableBody" class="divide-y divide-white/50"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BLACKLIST_KEYWORDS = [
            "PHOTOSHOP", "ADOBE", "LIGHTROOM", "ILLUSTRATOR", "MEITU", "GIMP", "CANVA", "PICSART", "SNAXEL",
            "AI GENERATED", "STABLE DIFFUSION", "MIDJOURNEY", "DALL-E", "WONDER", "ARTBREEDER", "FIREFLY",
            "PICTUREID", "THUMBNAILIMAGE", "SAMSUNG-PICTUREID", "RETOUCH", "ENHANCE", "FAKED", "GENERATIVE"
        ];

        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const imgCanvas = document.getElementById('imgCanvas');
        const maskCanvas = document.getElementById('maskCanvas');
        const ctx = imgCanvas.getContext('2d', { willReadFrequently: true });
        const maskCtx = maskCanvas.getContext('2d');
        const summaryText = document.getElementById('summaryText');
        const statusBadge = document.getElementById('statusBadge');
        const magnifier = document.getElementById('magnifier');

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFile(e.target.files[0]);
        document.getElementById('runElaBtn').onclick = () => runElaAnalysis();

        // 拖拽
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.style.backgroundColor = 'var(--ice-melt)'; };
        dropZone.ondragleave = () => dropZone.style.backgroundColor = '';
        dropZone.ondrop = (e) => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); };

        function handleFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    setupUI(img);
                    performExifAudit(file); 
                    setTimeout(runElaAnalysis, 600); 
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function setupUI(img) {
            imgCanvas.width = maskCanvas.width = img.width;
            imgCanvas.height = maskCanvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            dropZone.classList.add('hidden');
            document.getElementById('previewContainer').classList.remove('hidden');
            document.getElementById('reportPanel').classList.remove('hidden');
            setupMagnifier();
        }

        function performExifAudit(file) {
            const riskContainer = document.getElementById('riskAlerts');
            const tableBody = document.getElementById('exifTableBody');
            riskContainer.innerHTML = '';
            tableBody.innerHTML = '';
            
            EXIF.getData(file, function() {
                const tags = EXIF.getAllTags(this);
                const tagKeys = Object.keys(tags);
                document.getElementById('exifCount').innerText = `${tagKeys.length} Tags`;
                document.getElementById('exifDataArea').classList.remove('hidden');
                const tagsString = JSON.stringify(tags).toUpperCase();
                
                const binaryReader = new FileReader();
                binaryReader.onload = function() {
                    const binaryContent = new TextDecoder().decode(new Uint8Array(this.result.slice(0, 500000))).toUpperCase();
                    let hitKeywords = [];

                    BLACKLIST_KEYWORDS.forEach(word => {
                        if (tagsString.includes(word) || binaryContent.includes(word)) hitKeywords.push(word);
                    });

                    let hasThumbnail = tags.thumbnail || tags.ThumbnailImage || binaryContent.includes("THUMBNAILIMAGE");
                    if (hasThumbnail && !hitKeywords.includes("THUMBNAILIMAGE")) hitKeywords.push("THUMBNAILIMAGE");

                    if (hitKeywords.length > 0) {
                        statusBadge.innerText = "🚨 风险检出";
                        statusBadge.className = "px-3 py-1 rounded-full text-[10px] font-black text-white bg-red-400";
                        hitKeywords.forEach(word => {
                            const alert = document.createElement('div');
                            alert.className = "p-4 alert-raindrops rounded-2xl text-[11px] font-bold flex items-center gap-3 shadow-sm critical-hit";
                            alert.innerHTML = `<span class='text-lg'>⚠️</span> 检出属性违规：[${word}]`;
                            riskContainer.appendChild(alert);
                        });
                        summaryText.innerHTML = `此图并非直出。属性中包含 <b>${hitKeywords.length}</b> 处编辑记录指纹。${hasThumbnail ? "<br><br><b>注意：</b>缩略图残留确认此图经过软件二次重存。" : ""}`;
                    } else {
                        statusBadge.innerText = "✅ 属性纯净";
                        statusBadge.className = "px-3 py-1 rounded-full text-[10px] font-black text-white bg-green-400";
                        summaryText.innerText = "元数据未发现已知编辑工具的修改指纹。";
                    }

                    tagKeys.forEach(key => {
                        const row = `<tr><td class="p-3 font-bold text-slate-500 w-1/3">${key}</td><td class="p-3 text-slate-600 break-all font-mono">${tags[key]}</td></tr>`;
                        tableBody.innerHTML += row;
                    });
                };
                binaryReader.readAsArrayBuffer(file);
            });
        }

        function runElaAnalysis() {
            maskCtx.clearRect(0, 0, maskCanvas.width, maskCanvas.height);
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = imgCanvas.width;
            tempCanvas.height = imgCanvas.height;
            const tCtx = tempCanvas.getContext('2d');
            tCtx.drawImage(imgCanvas, 0, 0);

            const resaved = new Image();
            resaved.onload = () => {
                tCtx.drawImage(resaved, 0, 0);
                const original = ctx.getImageData(0, 0, imgCanvas.width, imgCanvas.height).data;
                const modified = tCtx.getImageData(0, 0, imgCanvas.width, imgCanvas.height).data;
                
                const blockSize = 16;
                let suspectCount = 0;
                maskCtx.strokeStyle = "rgba(255, 255, 255, 0.5)";
                maskCtx.lineWidth = 1;

                for (let y = 0; y < imgCanvas.height; y += blockSize) {
                    for (let x = 0; x < imgCanvas.width; x += blockSize) {
                        let diff = 0;
                        for (let i = 0; i < blockSize * blockSize; i++) {
                            const idx = ((y + Math.floor(i/blockSize)) * imgCanvas.width + (x + i%blockSize)) * 4;
                            if (idx < original.length) {
                                diff += Math.abs(original[idx] - modified[idx]) + 
                                        Math.abs(original[idx+1] - modified[idx+1]) + 
                                        Math.abs(original[idx+2] - modified[idx+2]);
                            }
                        }
                        const score = diff / (blockSize * blockSize * 3);
                        if (score > 20) { 
                            maskCtx.strokeRect(x, y, blockSize, blockSize);
                            suspectCount++;
                        }
                    }
                }

                if (suspectCount > 5) {
                    const alert = document.createElement('div');
                    alert.style.backgroundColor = 'var(--orchid-tint)';
                    alert.className = "p-4 rounded-2xl text-[11px] font-bold text-slate-700 flex items-center gap-3 border border-white shadow-sm";
                    alert.innerHTML = `<span>📊</span> 像素分析：发现 ${suspectCount} 处噪点能量异常块`;
                    document.getElementById('riskAlerts').appendChild(alert);
                }
            };
            resaved.src = tempCanvas.toDataURL('image/jpeg', 0.85);
        }

        function setupMagnifier() {
            imgCanvas.onmousemove = (e) => {
                const rect = imgCanvas.getBoundingClientRect();
                const x = e.clientX - rect.left, y = e.clientY - rect.top;
                const scaleX = imgCanvas.width / rect.width, scaleY = imgCanvas.height / rect.height;
                
                magnifier.style.display = "block";
                magnifier.style.left = `${x + 20}px`;
                magnifier.style.top = `${y + 20}px`;
                magnifier.style.backgroundImage = `url(${imgCanvas.toDataURL()})`;
                magnifier.style.backgroundSize = `${rect.width * scaleX * 6}px ${rect.height * scaleY * 6}px`;
                magnifier.style.backgroundPosition = `-${x * scaleX * 6 - 100}px -${y * scaleY * 6 - 100}px`;
            };
            imgCanvas.onmouseleave = () => magnifier.style.display = "none";
        }
    </script>
</body>
</html>
